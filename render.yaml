services:
  # 1. Backend Web Service (Flask app)
  - type: web
    name: gutenberg-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "from app import init_db; init_db()" && python seed_books.py
    startCommand: gunicorn app:app
    envVars:
      - key: FRONTEND_URL
        value: https://gutenberg-frontend.onrender.com # TODO: Replace with your actual frontend Render URL after creation
      - key: PYTHON_VERSION
        value: 3.10.0 # Adjust to your desired Python version if needed

  # 2. Frontend Static Site (React/Vite app)
  - type: web
    name: gutenberg-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://gutenberg-backend.onrender.com # TODO: Replace with your actual backend Render URL after creation
